    <path d="M1030 130c-36 10-72 40-92 82-20 42-18 88 4 118l-42 42 30 30 42-42c30 22 76 24 118 4 42-20 72-56 82-92-34-10-70-30-98-58-28-28-48-64-58-98z" />
    <circle cx="980" cy="250" r="22" fill="#0b1220" opacity="0.65"/>
