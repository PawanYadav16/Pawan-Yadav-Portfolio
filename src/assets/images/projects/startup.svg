    <rect x="190" y="235" width="320" height="14" rx="7" />
    <rect x="190" y="260" width="280" height="14" rx="7" />

    <rect x="190" y="365" width="210" height="18" rx="9" />
    <rect x="190" y="395" width="300" height="14" rx="7" />
    <rect x="190" y="420" width="260" height="14" rx="7" />

