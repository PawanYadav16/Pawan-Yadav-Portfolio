<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f97316" stop-opacity="0.40" />
      <stop offset="0.5" stop-color="#0b1220" stop-opacity="1" />
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0.38" />
    </linearGradient>
    <radialGradient id="glow1" cx="30%" cy="20%" r="55%">
      <stop offset="0" stop-color="#f8fafc" stop-opacity="0.18" />
      <stop offset="1" stop-color="#000" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glow2" cx="78%" cy="78%" r="65%">
      <stop offset="0" stop-color="#a78bfa" stop-opacity="0.15" />
      <stop offset="1" stop-color="#000" stop-opacity="0" />
    </radialGradient>
  </defs>

  <rect width="1200" height="600" fill="url(#bg)" />
  <rect width="1200" height="600" fill="url(#glow1)" />
  <rect width="1200" height="600" fill="url(#glow2)" />

  <!-- Marketplace cards -->
  <g opacity="0.22" fill="#e2e8f0">
